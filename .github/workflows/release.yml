name: Build and Release

on:
    push:
        tags:
            - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: '3.11'

            - name: Install Python test dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements-dev.txt

            - name: Run backend tests
              run: pytest -q

            - name: Setup pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 9

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Install frontend dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Run frontend tests
              run: pnpm test:frontend

    build-and-release:
        needs: test
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v5
              with:
                  version: 9

            - name: Set up Node.js
              uses: actions/setup-node@v5
              with:
                  node-version: 24

            - name: Extract Version from Tag
              id: version
              run: |
                  # Extract version from tag (v1.2.3 -> 1.2.3)
                  VERSION=${GITHUB_REF_NAME#v}
                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "tag=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT
                  echo "📦 Release Version: $VERSION"

            - name: Inject Version into Files
              run: |
                  VERSION=${{ steps.version.outputs.version }}

                  # Update package.json
                  jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

                  # Update plugin.json
                  jq --arg v "$VERSION" '.version = $v' plugin.json > plugin.json.tmp && mv plugin.json.tmp plugin.json

                  echo "✅ Injected version $VERSION into package.json and plugin.json"

            - name: Install dependencies
              run: pnpm install --no-frozen-lockfile

            - name: Build plugin
              run: pnpm build

            - name: Create release zip
              run: |
                  # Create release directory structure
                  mkdir -p release/decky-ukr-badge/dist

                  # Copy required files
                  cp -r dist/* release/decky-ukr-badge/dist/
                  cp main.py release/decky-ukr-badge/
                  cp plugin.json release/decky-ukr-badge/
                  cp package.json release/decky-ukr-badge/
                  cp LICENSE release/decky-ukr-badge/
                  cp README.md release/decky-ukr-badge/

                  # Create zip
                  cd release
                  zip -r ../release.zip decky-ukr-badge
                  cd ..

                  # Cleanup
                  rm -rf release

                  echo "✅ Created release.zip"
                  unzip -l release.zip

            - name: Generate Changelog
              id: changelog
              run: |
                  # Get previous tag
                  PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
                  CURRENT_TAG=${{ steps.version.outputs.tag }}

                  echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

                  if [ -n "$PREV_TAG" ]; then
                      echo "📋 Generating changelog from $PREV_TAG to $CURRENT_TAG"

                      # Generate changelog from commits
                      CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --no-merges | head -20)

                      # Escape for multiline output
                      echo "changelog<<EOF" >> $GITHUB_OUTPUT
                      echo "$CHANGELOG" >> $GITHUB_OUTPUT
                      echo "EOF" >> $GITHUB_OUTPUT
                  else
                      echo "changelog=- Initial release" >> $GITHUB_OUTPUT
                  fi

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  cat > RELEASE_NOTES.md << 'EOF'
                  ## 🇺🇦 decky-ukr-badge ${{ steps.version.outputs.tag }}

                  ### Installation
                  1. Download `release.zip` below
                  2. On Steam Deck, open **Decky Loader** → ⚙️ **Settings** → **Developer**
                  3. Select **Install Plugin From File** and choose the downloaded zip

                  ### Changes
                  ${{ steps.changelog.outputs.changelog }}

                  ---
                  📝 Auto-generated from commit [`${{ github.sha }}`](https://github.com/yataktyni/decky-ukr-badge/commit/${{ github.sha }})

                  🔗 [Compare with previous release](https://github.com/yataktyni/decky-ukr-badge/compare/${{ steps.changelog.outputs.prev_tag }}...${{ steps.version.outputs.tag }})

                  📖 [Full documentation](https://github.com/yataktyni/decky-ukr-badge#readme)
                  EOF

                  gh release create "${{ steps.version.outputs.tag }}"                     --title "Release ${{ steps.version.outputs.tag }}"                     --notes-file RELEASE_NOTES.md                     release.zip plugin.json
